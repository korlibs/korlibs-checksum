name: DOCS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      forced_version:
        description: 'FORCED_VERSION to use'
        required: true
        type: string

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  CI: true
  FORCED_VERSION: ${{ inputs.forced_version || github.ref }}
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: zulu

jobs:
  publish:
    timeout-minutes: 300
    runs-on: ubuntu-latest
    steps:
      - { name: Checkout, uses: actions/checkout@v4 }
      - { name: Use Node.js 20.x, uses: actions/setup-node@v4, with: { node-version: 20.x } }
      - { name: Set up JDK, uses: actions/setup-java@v4, with: { distribution: "${{ env.JAVA_DISTRIBUTION }}", java-version: "${{ env.JAVA_VERSION }}" } }
      - { name: Prepare Gradle, uses: gradle/actions/setup-gradle@v4 }
      - { name: Initialize Gradle, run: ./gradlew --no-configuration-cache }
      - { name: Build Documentation, run: ./gradlew --no-configuration-cache dokkaGenerateHtml }
      - { name: Upload artifact, uses: actions/upload-pages-artifact@v4, with: { path: 'korlibs-checksum/build/dokka/html' } }
      - { name: Deploy 🚀 to GitHub Pages, id: deployment, uses: actions/deploy-pages@v5 }
